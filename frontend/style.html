<style>

/* ==========================================================
   PIBM Resume Builder v1.0
   Global Styles - Foundation Layer
   ========================================================== */

:root{
    --primary:#0F4C81;
    --primary-dark:#0A3760;
    --secondary:#FFC107;
    --sidebar:#1F2937;
    --sidebar-hover:#374151;
    --background:#F4F7FA;
    --white:#FFFFFF;
    --border:#E5E7EB;
    --text:#1F2937;
    --muted:#6B7280;
    --success:#22C55E;
    --danger:#EF4444;
    --warning:#F59E0B;
    --shadow:0 8px 24px rgba(0,0,0,.08);
    --radius:14px;
}

/* ==========================================================
   Reset
   ========================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    height:100%;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--background);
    color:var(--text);
    overflow:hidden;
}

/* ==========================================================
   Layout
   ========================================================== */

#app{
    display:flex;
    height:100vh;
}

/* ==========================================================
   Sidebar
   ========================================================== */

#sidebar{
    width:260px;
    background:var(--sidebar);
    color:#fff;
    display:flex;
    flex-direction:column;
    transition:all .3s ease;
}

.logo{
    height:80px;
    display:flex;
    align-items:center;
    gap:15px;
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo-circle{
    width:48px;
    height:48px;
    border-radius:50%;
    background:var(--secondary);
    color:#000;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.logo-text h2{
    font-size:20px;
    margin:0;
}

.logo-text span{
    font-size:12px;
    opacity:.75;
}

nav{
    flex:1;
    overflow-y:auto;
}

nav ul{
    list-style:none;
    padding:18px 0;
}

nav li{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 22px;
    cursor:pointer;
    transition:.25s;
    font-size:15px;
}

nav li:hover{
    background:var(--sidebar-hover);
}

nav li.active{
    background:var(--primary);
}

/* ==========================================================
   Material Icons
   ========================================================== */

.material-symbols-outlined{
    font-size:22px;
}

/* ==========================================================
   Main
   ========================================================== */

#main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ==========================================================
   Header
   ========================================================== */

header{
    height:70px;
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    box-shadow:var(--shadow);
    z-index:5;
}

.header-title h1{
    font-size:22px;
    font-weight:600;
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
}

#menuBtn{
    display:none;
    border:none;
    background:none;
    cursor:pointer;
}

/* ==========================================================
   Content
   ========================================================== */

#content{
    flex:1;
    overflow-y:auto;
    padding:30px;
}

/* ==========================================================
   Cards
   ========================================================== */

.card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:24px;
    margin-bottom:20px;
}

/* ==========================================================
   Dashboard
   ========================================================== */

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.dashboard .card{
    text-align:center;
}

.dashboard .card h3{
    font-size:18px;
    color:var(--muted);
    margin-bottom:15px;
}

.dashboard .card h1{
    font-size:42px;
    color:var(--primary);
    font-weight:700;
}

/* ==========================================================
   Buttons
   ========================================================== */

.btn{
    border:none;
    border-radius:10px;
    padding:12px 20px;
    cursor:pointer;
    font-size:14px;
    font-family:inherit;
    transition:.25s;
}

.btn-primary{
    background:var(--primary);
    color:#fff;
}

.btn-primary:hover{
    background:var(--primary-dark);
}

.btn-secondary{
    background:var(--secondary);
}

/* ==========================================================
   Forms
   ========================================================== */

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-family:inherit;
    font-size:14px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:var(--primary);
}

/* ==========================================================
   Loader
   ========================================================== */

#loader{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.75);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.hidden{
    display:none !important;
}

.spinner{
    width:54px;
    height:54px;
    border:5px solid #ddd;
    border-top:5px solid var(--primary);
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* ==========================================================
   Toast
   ========================================================== */

#toast{
    position:fixed;
    right:25px;
    bottom:25px;
    background:var(--primary);
    color:#fff;
    padding:14px 20px;
    border-radius:10px;
    box-shadow:var(--shadow);
    display:none;
    z-index:9999;
}

/* ==========================================================
   Responsive
   ========================================================== */

@media(max-width:900px){

    #sidebar{
        position:fixed;
        left:-260px;
        top:0;
        bottom:0;
        z-index:100;
    }

    #sidebar.open{
        left:0;
    }

    #menuBtn{
        display:block;
    }

    header{
        padding:0 18px;
    }

    #content{
        padding:18px;
    }

}

/* ==========================================================
   Personal Module
========================================================== */

.page-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}

.page-header h2{

    margin-bottom:5px;

}

.page-header p{

    color:var(--muted);

}

.profile-layout{

    display:grid;

    grid-template-columns:280px 1fr;

    gap:25px;

}

.profile-photo-card{

    text-align:center;

    height:fit-content;

}

.photo-container{

    margin-bottom:20px;

}

.photo-container img{

    width:180px;

    height:180px;

    border-radius:50%;

    border:6px solid #f1f1f1;

    object-fit:cover;

}

.profile-form{

    display:flex;

    flex-direction:column;

    gap:20px;

}

.form-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.form-group.full{

    grid-column:1/-1;

}

@media(max-width:900px){

.profile-layout{

    grid-template-columns:1fr;

}

.form-grid{

    grid-template-columns:1fr;

}

.page-header{

    flex-direction:column;

    align-items:flex-start;

    gap:15px;

}

}

</style>
