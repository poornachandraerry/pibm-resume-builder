
<style>

:root{
  --primary:#0B3C5D;
  --secondary:#F4B400;
  --light:#F5F7FA;
  --white:#FFFFFF;
  --success:#28a745;
  --danger:#dc3545;
  --shadow:0 4px 14px rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--light);
  overflow-x:hidden;
}

.wrapper{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:var(--primary);
  color:#fff;
  position:fixed;
  top:0;
  left:0;
  bottom:0;
  overflow-y:auto;
  box-shadow:var(--shadow);
}

.logo-area{
  text-align:center;
  padding:24px 15px;
  border-bottom:1px solid rgba(255,255,255,.15);
}

.logo-area h5{
  color:#fff;
  font-weight:600;
}

.menu{
  padding:15px;
}

.menu a{
  display:block;
  text-decoration:none;
  color:#fff;
  padding:12px 16px;
  margin-bottom:8px;
  border-radius:10px;
  transition:.25s;
  font-size:15px;
}

.menu a:hover,
.menu a.active{
  background:rgba(255,255,255,.15);
}

.menu i{
  margin-right:10px;
}

.main-content{
  margin-left:260px;
  width:calc(100% - 260px);
  min-height:100vh;
}

.topbar{
  height:70px;
  background:#fff;
  border-bottom:1px solid #e5e5e5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  position:sticky;
  top:0;
  z-index:100;
}

.page-content{
  padding:25px;
}

.card{
  border:none;
  border-radius:14px;
  box-shadow:var(--shadow);
}

.dashboard-card{
  cursor:pointer;
  transition:.2s;
}

.dashboard-card:hover{
  transform:translateY(-4px);
}

.btn-primary{
  background:var(--primary);
  border-color:var(--primary);
}

.btn-primary:hover{
  background:#0e4f79;
  border-color:#0e4f79;
}

.progress{
  height:12px;
  border-radius:8px;
}

.progress-bar{
  background:var(--secondary);
}

.loader-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.d-none{
  display:none!important;
}

.toast-box{
  position:fixed;
  top:20px;
  right:20px;
  background:#222;
  color:#fff;
  padding:12px 18px;
  border-radius:8px;
  z-index:10000;
  box-shadow:var(--shadow);
}

.widget{
  background:#fff;
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:20px;
}

.widget-title{
  font-weight:600;
  margin-bottom:15px;
}

@media(max-width:992px){

  .sidebar{
    width:80px;
  }

  .logo-area h5{
    display:none;
  }

  .menu a{
    text-align:center;
    padding:14px 8px;
  }

  .menu a i{
    margin-right:0;
    display:block;
    font-size:20px;
  }

  .main-content{
    margin-left:80px;
    width:calc(100% - 80px);
  }

}

@media(max-width:768px){

  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }

  .main-content{
    margin-left:0;
    width:100%;
  }

  .wrapper{
    display:block;
  }

}

</style>
