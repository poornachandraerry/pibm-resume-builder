<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PIBM Resume Builder</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet">

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>

    body{

      font-family:'Poppins',sans-serif;

      background:#f4f6f9;

      margin:0;

      overflow-x:hidden;

    }

    .sidebar{

      width:260px;

      position:fixed;

      top:0;

      left:0;

      bottom:0;

      background:#0B3C5D;

      color:#fff;

      overflow-y:auto;

      box-shadow:2px 0 8px rgba(0,0,0,.15);

    }

    .content{

      margin-left:260px;

      min-height:100vh;

    }

    .topbar{

      background:#ffffff;

      height:70px;

      display:flex;

      align-items:center;

      justify-content:space-between;

      padding:0 30px;

      border-bottom:1px solid #ddd;

      position:sticky;

      top:0;

      z-index:100;

    }

    .page{

      padding:25px;

    }

    .brand{

      padding:20px;

      text-align:center;

      border-bottom:1px solid rgba(255,255,255,.15);

    }

    .brand h4{

      margin:10px 0 0;

      font-weight:600;

    }

    .menu{

      padding:15px 0;

    }

    .menu a{

      display:block;

      color:white;

      text-decoration:none;

      padding:12px 25px;

      transition:.25s;

      font-size:15px;

    }

    .menu a:hover{

      background:#114f7a;

      padding-left:35px;

    }

    .menu i{

      margin-right:12px;

    }

    .card{

      border:none;

      border-radius:12px;

      box-shadow:0 2px 8px rgba(0,0,0,.08);

    }

    @media(max-width:992px){

      .sidebar{

        width:80px;

      }

      .content{

        margin-left:80px;

      }

      .brand h4{

        display:none;

      }

      .menu span{

        display:none;

      }

    }

  </style>

</head>

<body>

  <!-- Sidebar -->

  <div class="sidebar">

    <div class="brand">

      <img
        src="https://pibm.in/wp-content/uploads/2023/07/PIBM-Logo.png"
        width="70">

      <h4>Resume Builder</h4>

    </div>

    <div class="menu">

      <a href="#" onclick="loadPage('dashboard')">

        <i class="bi bi-speedometer2"></i>

        <span>Dashboard</span>

      </a>

      <a href="#" onclick="loadPage('student')">

        <i class="bi bi-person-circle"></i>

        <span>My Profile</span>

      </a>

      <a href="#" onclick="loadPage('preview')">

        <i class="bi bi-file-earmark-text"></i>

        <span>Resume Preview</span>

      </a>

      <a href="#" onclick="generateResume()">

        <i class="bi bi-file-earmark-pdf"></i>

        <span>Generate Resume</span>

      </a>

      <a href="#">

        <i class="bi bi-box-arrow-right"></i>

        <span>Logout</span>

      </a>

    </div>

  </div>

  <!-- Main Content -->

  <div class="content">

    <div class="topbar">

      <h5 class="m-0">
        PIBM Resume Builder
      </h5>

      <div id="userInfo">

        Loading...

      </div>

    </div>

    <div class="page" id="pageContent">

      <div class="text-center mt-5">

        <div class="spinner-border text-primary"></div>

        <h5 class="mt-3">

          Loading Dashboard...

        </h5>

      </div>

    </div>

  </div>

  <!-- Bootstrap -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    window.onload=function(){

      loadDashboard();

    };

    function loadDashboard(){

      google.script.run
        .withSuccessHandler(function(html){

          document.getElementById("pageContent").innerHTML = html;

        })
        .getDashboardPage();

    }

    function showDashboard(data){

      document.getElementById("userInfo").innerHTML=

        "<strong>"+data.user.name+"</strong>";

      document.getElementById("pageContent").innerHTML=

      `
      <div class="row g-4">

      <div class="col-md-3">

      <div class="card p-3">

      <h2>${data.education}</h2>

      <small>Education</small>

      </div>

      </div>

      <div class="col-md-3">

      <div class="card p-3">

      <h2>${data.experience}</h2>

      <small>Experience</small>

      </div>

      </div>

      <div class="col-md-3">

      <div class="card p-3">

      <h2>${data.projects}</h2>

      <small>Projects</small>

      </div>

      </div>

      <div class="col-md-3">

      <div class="card p-3">

      <h2>${data.skills}</h2>

      <small>Skills</small>

      </div>

      </div>

      </div>
      `;

    }

    function loadPage(page){

      alert(page+" screen will be built next.");

    }

    function generateResume(){

      alert("Resume Generator will be added in next module.");

    }

  </script>

</body>

</html>
