
<script>
const PIBM={

state:{
 studentId:"STU000001",
 currentModule:"dashboard",
 profile:{}
},

init(){
 this.loadUser();
 this.loadModule("dashboard");
},

loadUser(){
 google.script.run
 .withSuccessHandler(function(user){
    if(!user) return;
    PIBM.state.studentId=user.studentId||"";
    const el=document.getElementById("userInfo");
    if(el){
      el.innerHTML="<strong>"+user.name+"</strong>";
    }
 })
 .getCurrentUser();
},

loadModule(moduleName){

 PIBM.state.currentModule=moduleName;

 PIBM.showLoader();

 google.script.run
 .withSuccessHandler(function(html){

    const content=document.getElementById("content");
    if(content){
      content.innerHTML=html;
    }

    PIBM.hideLoader();

    PIBM.afterModuleLoad(moduleName);

 })
 .withFailureHandler(function(err){

    PIBM.hideLoader();

    PIBM.toast(err.message||err);

 })
 .getModule(moduleName);

},

afterModuleLoad(module){

 switch(module){

   case "dashboard":
      if(typeof loadDashboard==="function"){
         loadDashboard();
      }
      break;

   case "personal":
      if(typeof initPersonal==="function"){
         initPersonal();
      }
      break;

 }

},

call(serverFunction,args,callback){

 PIBM.showLoader();

 let runner=google.script.run
 .withSuccessHandler(function(result){

    PIBM.hideLoader();

    if(callback){
      callback(result);
    }

 })
 .withFailureHandler(function(err){

    PIBM.hideLoader();

    PIBM.toast(err.message||err);

 });

 runner[serverFunction].apply(runner,args||[]);

},

showLoader(){
 const x=document.getElementById("loader");
 if(x)x.classList.remove("d-none");
},

hideLoader(){
 const x=document.getElementById("loader");
 if(x)x.classList.add("d-none");
},

toast(message){

 const t=document.getElementById("toast");

 if(!t) return;

 t.innerHTML=message;

 t.classList.remove("d-none");

 setTimeout(function(){

   t.classList.add("d-none");

 },3000);

},

previewResume(){

 PIBM.loadModule("preview");

},

generateResume(){

 PIBM.loadModule("preview");

},

downloadResume(){

 PIBM.loadModule("preview");

}

};

window.onload=function(){
 PIBM.init();
};

function openModule(name){
 PIBM.loadModule(name);
}

function previewResume(){
 PIBM.previewResume();
}

function generateResume(){
 PIBM.generateResume();
}

function downloadResume(){
 PIBM.downloadResume();
}
</script>
