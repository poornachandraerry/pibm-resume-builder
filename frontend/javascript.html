
<script>
const PIBM={

state:{
 studentId:"STU000001",
 currentModule:"dashboard",
 profile:{}
},

init(){
 this.loadUser();
 this.loadModule("dashboard");
},

loadUser(){
 google.script.run
 .withSuccessHandler(function(user){
    if(!user) return;
    PIBM.state.studentId=user.studentId||"";
    const el=document.getElementById("userInfo");
    if(el){
      el.innerHTML="<strong>"+user.name+"</strong>";
    }
 })
 .getCurrentUser();
},

loadModule(moduleName){

 PIBM.state.currentModule=moduleName;

 PIBM.showLoader();

 google.script.run
 .withSuccessHandler(function(html){

    const content=document.getElementById("content");
    if(content){
      content.innerHTML=html;
      PIBM.runScripts(content);
    }

    PIBM.hideLoader();

    PIBM.afterModuleLoad(moduleName);

 })
 .withFailureHandler(function(err){

    PIBM.hideLoader();

    PIBM.toast(err.message||err);

 })
 .getModule(moduleName);

},

/**
 * Scripts inserted via element.innerHTML are parsed into the DOM
 * but browsers deliberately do NOT execute them. Each module's
 * inline <script> block (loadDashboard, initPersonal, etc.) would
 * silently never run without this - we re-create every script tag
 * so the browser treats it as freshly inserted and executes it.
 */
runScripts(container){

 const oldScripts=container.querySelectorAll("script");

 oldScripts.forEach(function(oldScript){

    const newScript=document.createElement("script");

    Array.from(oldScript.attributes).forEach(function(attr){
      newScript.setAttribute(attr.name,attr.value);
    });

    newScript.textContent=oldScript.textContent;

    oldScript.parentNode.replaceChild(newScript,oldScript);

 });

},

afterModuleLoad(module){
 // Modules self-initialize via direct function calls at the bottom
 // of each module's <script> block (replacing DOMContentLoaded).
 // No external dispatch needed here.
},

call(serverFunction,args,callback){

 PIBM.showLoader();

 let runner=google.script.run
 .withSuccessHandler(function(result){

    PIBM.hideLoader();

    if(callback){
      callback(result);
    }

 })
 .withFailureHandler(function(err){

    PIBM.hideLoader();

    PIBM.toast(err.message||err);

 });

 runner[serverFunction].apply(runner,args||[]);

},

showLoader(){
 const x=document.getElementById("loader");
 if(x)x.classList.remove("d-none");
},

hideLoader(){
 const x=document.getElementById("loader");
 if(x)x.classList.add("d-none");
},

toast(message){

 const t=document.getElementById("toast");

 if(!t) return;

 t.innerHTML=message;

 t.classList.remove("d-none");

 setTimeout(function(){

   t.classList.add("d-none");

 },3000);

},

previewResume(){

 PIBM.loadModule("preview");

},

generateResume(){

 PIBM.loadModule("preview");

},

downloadResume(){

 PIBM.loadModule("preview");

}

};

window.onload=function(){
 PIBM.init();
};

function openModule(name){
 PIBM.loadModule(name);
}

function previewResume(){
 PIBM.previewResume();
}

function generateResume(){
 PIBM.generateResume();
}

function downloadResume(){
 PIBM.downloadResume();
}
</script>
