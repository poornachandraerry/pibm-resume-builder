<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Experience</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f6f8}
.exp-card{background:#fff;border:1px solid #dee2e6;border-radius:10px;padding:18px;margin-bottom:16px}
</style>
</head>
<body>
<div class="container-fluid py-4">
<div class="d-flex justify-content-between align-items-center mb-3">
<h3>Experience Details</h3>
<button class="btn btn-success" onclick="addExperience()">+ Add Experience</button>
</div>
<div id="alertBox"></div>
<div id="experienceContainer"></div>
<div class="text-end"><button class="btn btn-primary" onclick="saveExperienceData()">Save Experience</button></div>
</div>

<template id="expTemplate">
<div class="exp-card exp-item">
<div class="row g-3">
<div class="col-md-3"><label class="form-label">Experience Type</label><select class="form-select Experience_Type"></select></div>
<div class="col-md-3"><label class="form-label">Employment Mode</label><select class="form-select Employment_Mode"></select></div>
<div class="col-md-6"><label class="form-label">Company Name</label><input class="form-control Company_Name"></div>
<div class="col-md-6"><label class="form-label">Designation</label><input class="form-control Designation"></div>
<div class="col-md-3"><label class="form-label">Start Date</label><input type="date" class="form-control Start_Date"></div>
<div class="col-md-3"><label class="form-label">End Date</label><input type="date" class="form-control End_Date"></div>
<div class="col-12"><label class="form-label">Roles & Responsibilities</label><textarea class="form-control Responsibilities" rows="4"></textarea></div>
<div class="col-12 text-end"><button class="btn btn-outline-danger" type="button" onclick="this.closest('.exp-item').remove()">Remove</button></div>
</div>
</div>
</template>

<script>
let expTypes=[], empModes=[];
init();

function init(){
 google.script.run.withSuccessHandler(function(t){
   expTypes=t||[];
   google.script.run.withSuccessHandler(function(m){
     empModes=m||[];
     loadExperience();
   }).getEmploymentModes();
 }).getExperienceTypes();
}

function addExperience(d={}){
 const node=expTemplate.content.cloneNode(true);
 const item=node.querySelector(".exp-item");
 const t=item.querySelector(".Experience_Type");
 expTypes.forEach(v=>t.add(new Option(v,v)));
 t.value=d.Experience_Type||"";
 const m=item.querySelector(".Employment_Mode");
 empModes.forEach(v=>m.add(new Option(v,v)));
 m.value=d.Employment_Mode||"";
 item.querySelector(".Company_Name").value=d.Company_Name||"";
 item.querySelector(".Designation").value=d.Designation||"";
 item.querySelector(".Start_Date").value=d.Start_Date||"";
 item.querySelector(".End_Date").value=d.End_Date||"";
 item.querySelector(".Responsibilities").value=d.Responsibilities||"";
 experienceContainer.appendChild(node);
}

function loadExperience(){
 const sid=sessionStorage.getItem("studentId")||"";
 google.script.run.withSuccessHandler(function(list){
   experienceContainer.innerHTML="";
   if(Array.isArray(list)&&list.length) list.forEach(addExperience);
   else addExperience();
 }).withFailureHandler(e=>show(e.message,"danger")).getExperience(sid);
}

function saveExperienceData(){
 const sid=sessionStorage.getItem("studentId")||"";
 const rows=[...document.querySelectorAll(".exp-item")];
 const data=[];
 for(const r of rows){
   const o={
    Experience_Type:r.querySelector(".Experience_Type").value,
    Employment_Mode:r.querySelector(".Employment_Mode").value,
    Company_Name:r.querySelector(".Company_Name").value.trim(),
    Designation:r.querySelector(".Designation").value.trim(),
    Start_Date:r.querySelector(".Start_Date").value,
    End_Date:r.querySelector(".End_Date").value,
    Responsibilities:r.querySelector(".Responsibilities").value.trim()
   };
   if(!o.Experience_Type||!o.Company_Name||!o.Designation||!o.Start_Date){
      show("Please complete mandatory fields.","danger");return;
   }
   data.push(o);
 }
 google.script.run.withSuccessHandler(r=>show(r.message||"Saved","success"))
 .withFailureHandler(e=>show(e.message,"danger"))
 .saveExperience(sid,data);
}
function show(msg,type){alertBox.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;}
</script>
</body>
</html>
