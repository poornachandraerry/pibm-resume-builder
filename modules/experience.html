<div class="container-fluid py-3">
  <div id="expMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Work Experience</h4>
    <button class="btn btn-success btn-sm" onclick="addExpRow()">+ Add Experience</button>
  </div>
  <div id="expContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveExp()">Save Experience</button>
  </div>
</div>

<script>
loadExperience();

function loadExperience() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("expContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) { list.forEach(addExpRow); }
      else { addExpRow(); }
    })
    .withFailureHandler(function(e) { expShow(e.message || e, "danger"); })
    .getExperienceList();
}

function addExpRow(data) {
  data = data || {};
  var d = document.getElementById("expContainer");
  var id = "exp_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  d.innerHTML += '<div class="border rounded p-3 mb-3 exp-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Company <span class="text-danger">*</span></label>' +
    '<input class="form-control exp-company" value="' + esc(data.Company||"") + '" placeholder="Company name"></div>' +
    '<div class="col-md-6"><label class="form-label">Designation</label>' +
    '<input class="form-control exp-desig" value="' + esc(data.Designation||"") + '" placeholder="e.g. Marketing Manager"></div>' +
    '<div class="col-md-3"><label class="form-label">Start Date</label>' +
    '<input class="form-control exp-start" value="' + esc(data.Start_Date||"") + '" placeholder="Jan 2022"></div>' +
    '<div class="col-md-3"><label class="form-label">End Date</label>' +
    '<input class="form-control exp-end" value="' + esc(data.End_Date||"") + '" placeholder="Present"></div>' +
    '<div class="col-md-5"><label class="form-label">Location</label>' +
    '<input class="form-control exp-loc" value="' + esc(data.Location||"") + '" placeholder="Pune, India"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '<div class="col-12"><label class="form-label">Key Responsibilities</label>' +
    '<textarea class="form-control exp-resp" rows="3" placeholder="Describe your key responsibilities...">' + esc(data.Responsibilities||"") + '</textarea></div>' +
    '</div></div>';
}

function saveExp() {
  var items = document.querySelectorAll(".exp-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var c = r.querySelector(".exp-company").value.trim();
    if (!c) { expShow("Company name is required for all rows.", "danger"); return; }
    data.push({
      Company:         c,
      Designation:     r.querySelector(".exp-desig").value.trim(),
      Start_Date:      r.querySelector(".exp-start").value.trim(),
      End_Date:        r.querySelector(".exp-end").value.trim(),
      Location:        r.querySelector(".exp-loc").value.trim(),
      Responsibilities:r.querySelector(".exp-resp").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { expShow("Experience saved successfully!", "success"); })
    .withFailureHandler(function(e) { expShow(e.message || e, "danger"); })
    .saveExperienceList(data);
}

function expShow(msg, type) {
  document.getElementById("expMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
