<div class="container-fluid py-3">
  <div id="projMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Projects</h4>
    <button class="btn btn-success btn-sm" onclick="addProjRow()">+ Add Project</button>
  </div>
  <div id="projContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveProj()">Save Projects</button>
  </div>
</div>

<script>
loadProjects();

function loadProjects() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("projContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) { list.forEach(addProjRow); }
      else { addProjRow(); }
    })
    .withFailureHandler(function(e) { projShow(e.message || e, "danger"); })
    .getProjectList();
}

function addProjRow(data) {
  data = data || {};
  var d = document.getElementById("projContainer");
  var id = "proj_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  d.innerHTML += '<div class="border rounded p-3 mb-3 proj-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Project Title <span class="text-danger">*</span></label>' +
    '<input class="form-control proj-title" value="' + esc(data.Title||data.Project_Title||"") + '" placeholder="e.g. Sales Dashboard"></div>' +
    '<div class="col-md-5"><label class="form-label">Technologies Used</label>' +
    '<input class="form-control proj-tech" value="' + esc(data.Technologies||"") + '" placeholder="e.g. Python, Excel, Power BI"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '<div class="col-12"><label class="form-label">Description</label>' +
    '<textarea class="form-control proj-desc" rows="3" placeholder="Describe your project, your role, and the outcome...">' + esc(data.Description||"") + '</textarea></div>' +
    '<div class="col-md-6"><label class="form-label">Project URL / GitHub</label>' +
    '<input class="form-control proj-url" value="' + esc(data.Project_URL||"") + '" placeholder="https://github.com/..."></div>' +
    '<div class="col-md-3"><label class="form-label">Year</label>' +
    '<input class="form-control proj-year" value="' + esc(data.Year||"") + '" placeholder="2024"></div>' +
    '</div></div>';
}

function saveProj() {
  var items = document.querySelectorAll(".proj-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var t = r.querySelector(".proj-title").value.trim();
    if (!t) { projShow("Project title is required for all rows.", "danger"); return; }
    data.push({
      Title:        t,
      Technologies: r.querySelector(".proj-tech").value.trim(),
      Description:  r.querySelector(".proj-desc").value.trim(),
      Project_URL:  r.querySelector(".proj-url").value.trim(),
      Year:         r.querySelector(".proj-year").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { projShow("Projects saved successfully!", "success"); })
    .withFailureHandler(function(e) { projShow(e.message || e, "danger"); })
    .saveProjectList(data);
}

function projShow(msg, type) {
  document.getElementById("projMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
