<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Projects</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.project-card{border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:16px;background:#fff}
</style>
</head>
<body>
<div class="container-fluid py-3">
<div id="msg"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
<h4>Academic & Live Projects</h4>
<button class="btn btn-success" onclick="addProject()">+ Add Project</button>
</div>

<div id="projectContainer"></div>

<div class="text-end mt-3">
<button class="btn btn-primary" onclick="saveProjects()">Save Projects</button>
</div>
</div>

<template id="projectTemplate">
<div class="project-card project-item">
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Project Title</label>
<input class="form-control title">
</div>
<div class="col-md-6">
<label class="form-label">Organization / Client</label>
<input class="form-control organization">
</div>

<div class="col-md-3">
<label class="form-label">Duration</label>
<input class="form-control duration" placeholder="3 Months">
</div>

<div class="col-md-3">
<label class="form-label">Team Size</label>
<input type="number" min="1" class="form-control team">
</div>

<div class="col-md-6">
<label class="form-label">Technologies / Tools</label>
<input class="form-control technology">
</div>

<div class="col-12">
<label class="form-label">Project Description</label>
<textarea class="form-control description" rows="4"></textarea>
</div>

<div class="col-md-6">
<label class="form-label">Key Achievement</label>
<input class="form-control achievement">
</div>

<div class="col-md-6">
<label class="form-label">GitHub / Live URL</label>
<input type="url" class="form-control url">
</div>

<div class="col-12 text-end">
<button type="button" class="btn btn-outline-danger" onclick="this.closest('.project-item').remove()">Remove</button>
</div>
</div>
</div>
</template>

<script>
loadProjects();

function addProject(d={}){
 const n=document.getElementById("projectTemplate").content.cloneNode(true);
 const p=n.querySelector(".project-item");
 p.querySelector(".title").value=d.Project_Title||"";
 p.querySelector(".organization").value=d.Organization||"";
 p.querySelector(".duration").value=d.Duration||"";
 p.querySelector(".team").value=d.Team_Size||"";
 p.querySelector(".technology").value=d.Technologies||"";
 p.querySelector(".description").value=d.Description||"";
 p.querySelector(".achievement").value=d.Achievement||"";
 p.querySelector(".url").value=d.Project_URL||"";
 projectContainer.appendChild(n);
}

function loadProjects(){
 google.script.run
 .withSuccessHandler(function(list){
   projectContainer.innerHTML="";
   if(Array.isArray(list)&&list.length){list.forEach(addProject);}
   else addProject();
 })
 .withFailureHandler(e=>show(e.message,"danger"))
 .getProjectList();
}

function saveProjects(){
 const data=[];
 for(const row of document.querySelectorAll(".project-item")){
   const obj={
    Project_Title:row.querySelector(".title").value.trim(),
    Organization:row.querySelector(".organization").value.trim(),
    Duration:row.querySelector(".duration").value.trim(),
    Team_Size:row.querySelector(".team").value.trim(),
    Technologies:row.querySelector(".technology").value.trim(),
    Description:row.querySelector(".description").value.trim(),
    Achievement:row.querySelector(".achievement").value.trim(),
    Project_URL:row.querySelector(".url").value.trim()
   };
   if(!obj.Project_Title){show("Project Title is required.","danger");return;}
   data.push(obj);
 }
 google.script.run
 .withSuccessHandler(()=>show("Projects saved successfully.","success"))
 .withFailureHandler(e=>show(e.message,"danger"))
 .saveProjectList(data);
}

function show(msg,type){
 msg.innerHTML="";
 document.getElementById("msg").innerHTML=
 `<div class="alert alert-${type} alert-dismissible fade show">${msg}
 <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
