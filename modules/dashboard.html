<div class="container-fluid py-4">

    <!-- Welcome -->
    <div class="row mb-4">

        <div class="col-lg-8">

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <h3 class="mb-1">
                        Welcome,
                        <span id="studentName">Student</span>
                    </h3>

                    <div class="text-muted mb-3">

                        <span id="studentId"></span>

                        |

                        <span id="studentProgram"></span>

                        |

                        <span id="studentBatch"></span>

                    </div>

                    <div class="progress" style="height:12px;">

                        <div
                            id="completionBar"
                            class="progress-bar bg-primary"
                            style="width:0%">
                        </div>

                    </div>

                    <div class="mt-2">

                        <strong id="completionText">
                            Profile Completion : 0%
                        </strong>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card shadow-sm border-0">

                <div class="card-body text-center">

                    <img
                        id="studentPhoto"
                        src="https://placehold.co/120x120"
                        class="rounded-circle mb-3"
                        style="width:120px;height:120px;object-fit:cover;">

                    <div>

                        <button
                            class="btn btn-primary w-100"
                            onclick="openModule('personal')">

                            Edit Profile

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- Status Cards -->

    <div class="row g-3">

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('personal')">

                <div class="card-body">

                    <h6>👤 Personal</h6>

                    <span id="personalStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('education')">

                <div class="card-body">

                    <h6>🎓 Education</h6>

                    <span id="educationStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('experience')">

                <div class="card-body">

                    <h6>💼 Experience</h6>

                    <span id="experienceStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('internships')">

                <div class="card-body">

                    <h6>🏢 Internship</h6>

                    <span id="internshipStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('projects')">

                <div class="card-body">

                    <h6>📂 Projects</h6>

                    <span id="projectStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('skills')">

                <div class="card-body">

                    <h6>🛠 Skills</h6>

                    <span id="skillStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('certifications')">

                <div class="card-body">

                    <h6>📜 Certifications</h6>

                    <span id="certificationStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card" onclick="openModule('achievements')">

                <div class="card-body">

                    <h6>🏆 Achievements</h6>

                    <span id="achievementStatus"
                          class="badge bg-secondary">
                        Pending
                    </span>

                </div>

            </div>

        </div>

    </div>


    <!-- Quick Actions -->

    <div class="row mt-4">

        <div class="col-lg-12">

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <h5 class="mb-3">

                        Quick Actions

                    </h5>

                    <button class="btn btn-primary me-2"
                            onclick="previewResume()">

                        Preview Resume

                    </button>

                    <button class="btn btn-success me-2"
                            onclick="generateResume()">

                        Generate Resume

                    </button>

                    <button class="btn btn-warning"
                            onclick="downloadResume()">

                        Download PDF

                    </button>

                </div>

            </div>

        </div>

    </div>


    <!-- Recent Activity -->

    <div class="row mt-4">

        <div class="col-lg-12">

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <h5 class="mb-3">

                        Recent Activity

                    </h5>

                    <ul
                        id="activityList"
                        class="list-group">

                        <li class="list-group-item text-muted">

                            No recent activity.

                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>
