<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{background:#f5f6f8}
    .card{border-radius:12px}
    .section-title{font-weight:600;color:#0d6efd}
    .required::after{content:" *";color:#dc3545}
  </style>
</head>

<body>

<div class="container-fluid py-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Personal Profile</h3>
  <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
</div>

<div id="message"></div>

<form id="profileForm">

<div class="card mb-3">
<div class="card-body">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label required">Full Name</label>
<input id="Full_Name" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label required">Email</label>
<input id="Email" type="email" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label required">Mobile</label>
<input id="Mobile" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Alternate Mobile</label>
<input id="Alternate_Mobile" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Date of Birth</label>
<input id="Date_of_Birth" type="date" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Gender</label>
<select id="Gender" class="form-select">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-4">
<label class="form-label">Current Location</label>
<input id="Current_Location" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Preferred Location</label>
<input id="Preferred_Location" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">LinkedIn URL</label>
<input id="LinkedIn_URL" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">GitHub URL</label>
<input id="GitHub_URL" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Portfolio URL</label>
<input id="Portfolio_URL" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Nationality</label>
<input id="Nationality" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">City</label>
<input id="City" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">State</label>
<input id="State" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Pincode</label>
<input id="Pincode" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Address</label>
<textarea id="Address" rows="2" class="form-control"></textarea>
</div>

<div class="col-12">
<label class="form-label">Resume Headline</label>
<input id="Resume_Headline" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Career Objective</label>
<textarea id="Career_Objective" rows="4" class="form-control"></textarea>
</div>

<div class="col-md-6">
<label class="form-label">Languages Known</label>
<input id="Languages_Known" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Strengths</label>
<input id="Strengths" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Hobbies</label>
<input id="Hobbies" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Resume Type</label>
<input id="Resume_Type" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Declaration</label>
<textarea id="Declaration" rows="2" class="form-control"></textarea>
</div>

</div>

</div>
</div>

</form>

</div>

<script>

loadProfile();

function loadProfile(){
 google.script.run
 .withSuccessHandler(function(res){
   if(!res || !res.success) return;
   const s=res.data;
   Object.keys(s).forEach(function(k){
      const el=document.getElementById(k);
      if(el) el.value=s[k]||"";
   });
 })
 .withFailureHandler(function(e){
   show(e.message,"danger");
 })
 .loadStudentProfile();
}

function saveProfile(){

 const student={};

 document.querySelectorAll("#profileForm input,#profileForm textarea,#profileForm select")
 .forEach(function(el){
    student[el.id]=el.value;
 });

 google.script.run
 .withSuccessHandler(function(res){
    if(res.success){
      show(res.message,"success");
    }else{
      show(res.message,"danger");
    }
 })
 .withFailureHandler(function(e){
    show(e.message,"danger");
 })
 .saveValidatedStudent(student);

}

function show(msg,type){
 document.getElementById("message").innerHTML=
 `<div class="alert alert-${type}">${msg}</div>`;
}

</script>

</body>
</html>
