<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Certifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.cert-card{border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:16px;background:#fff}
</style>
</head>
<body>
<div class="container-fluid py-3">
<div id="alertBox"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
<h4>Certifications</h4>
<button class="btn btn-success" onclick="addCertification()">+ Add Certification</button>
</div>

<div id="certificationContainer"></div>

<div class="text-end mt-3">
<button class="btn btn-primary" onclick="saveCertifications()">Save Certifications</button>
</div>
</div>

<template id="certTemplate">
<div class="cert-card cert-item">
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Certification Name</label>
<input class="form-control certName">
</div>

<div class="col-md-6">
<label class="form-label">Issuing Organization</label>
<input class="form-control issuer">
</div>

<div class="col-md-3">
<label class="form-label">Issue Date</label>
<input type="month" class="form-control issueDate">
</div>

<div class="col-md-3">
<label class="form-label">Expiry Date</label>
<input type="month" class="form-control expiryDate">
</div>

<div class="col-md-6">
<label class="form-label">Credential ID</label>
<input class="form-control credentialId">
</div>

<div class="col-md-12">
<label class="form-label">Credential URL</label>
<input type="url" class="form-control credentialUrl">
</div>

<div class="col-12 text-end">
<button type="button" class="btn btn-outline-danger" onclick="this.closest('.cert-item').remove()">Remove</button>
</div>
</div>
</div>
</template>

<script>
loadCertifications();

function addCertification(d={}){
 const n=document.getElementById("certTemplate").content.cloneNode(true);
 const c=n.querySelector(".cert-item");
 c.querySelector(".certName").value=d.Certification_Name||"";
 c.querySelector(".issuer").value=d.Issuing_Organization||"";
 c.querySelector(".issueDate").value=d.Issue_Date||"";
 c.querySelector(".expiryDate").value=d.Expiry_Date||"";
 c.querySelector(".credentialId").value=d.Credential_ID||"";
 c.querySelector(".credentialUrl").value=d.Credential_URL||"";
 certificationContainer.appendChild(n);
}

function loadCertifications(){
 google.script.run
 .withSuccessHandler(function(list){
   certificationContainer.innerHTML="";
   if(Array.isArray(list)&&list.length){list.forEach(addCertification);}
   else{addCertification();}
 })
 .withFailureHandler(e=>showAlert(e.message,"danger"))
 .getCertificationList();
}

function saveCertifications(){
 const data=[];
 for(const row of document.querySelectorAll(".cert-item")){
   const obj={
     Certification_Name:row.querySelector(".certName").value.trim(),
     Issuing_Organization:row.querySelector(".issuer").value.trim(),
     Issue_Date:row.querySelector(".issueDate").value,
     Expiry_Date:row.querySelector(".expiryDate").value,
     Credential_ID:row.querySelector(".credentialId").value.trim(),
     Credential_URL:row.querySelector(".credentialUrl").value.trim()
   };
   if(!obj.Certification_Name){
      showAlert("Certification Name is required.","danger");
      return;
   }
   data.push(obj);
 }

 google.script.run
 .withSuccessHandler(()=>showAlert("Certification details saved successfully.","success"))
 .withFailureHandler(e=>showAlert(e.message,"danger"))
 .saveCertificationList(data);
}

function showAlert(msg,type){
 document.getElementById("alertBox").innerHTML=
 `<div class="alert alert-${type} alert-dismissible fade show">
 ${msg}
 <button class="btn-close" data-bs-dismiss="alert"></button>
 </div>`;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
