<div class="container-fluid py-3">
  <div id="certMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Certifications</h4>
    <button class="btn btn-success btn-sm" onclick="addCertRow()">+ Add Certification</button>
  </div>
  <div id="certContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveCert()">Save Certifications</button>
  </div>
</div>

<script>
loadCertifications();

function loadCertifications() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("certContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) { list.forEach(addCertRow); }
      else { addCertRow(); }
    })
    .withFailureHandler(function(e) { certShow(e.message || e, "danger"); })
    .getCertificationList();
}

function addCertRow(data) {
  data = data || {};
  var d = document.getElementById("certContainer");
  var id = "cert_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  d.innerHTML += '<div class="border rounded p-3 mb-3 cert-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Certification Name <span class="text-danger">*</span></label>' +
    '<input class="form-control cert-name" value="' + esc(data.Certification_Name||data.Name||"") + '" placeholder="e.g. Google Analytics, AWS Cloud"></div>' +
    '<div class="col-md-5"><label class="form-label">Issuing Organization</label>' +
    '<input class="form-control cert-org" value="' + esc(data.Organization||data.Issuer||"") + '" placeholder="e.g. Google, Coursera, Udemy"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '<div class="col-md-3"><label class="form-label">Issue Date</label>' +
    '<input class="form-control cert-date" value="' + esc(data.Issue_Date||"") + '" placeholder="Jan 2024"></div>' +
    '<div class="col-md-3"><label class="form-label">Credential ID</label>' +
    '<input class="form-control cert-id" value="' + esc(data.Credential_ID||"") + '" placeholder="Optional"></div>' +
    '<div class="col-md-5"><label class="form-label">Certificate URL</label>' +
    '<input class="form-control cert-url" value="' + esc(data.Certificate_URL||"") + '" placeholder="https://..."></div>' +
    '</div></div>';
}

function saveCert() {
  var items = document.querySelectorAll(".cert-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var n = r.querySelector(".cert-name").value.trim();
    if (!n) { certShow("Certification name is required.", "danger"); return; }
    data.push({
      Certification_Name: n,
      Organization:       r.querySelector(".cert-org").value.trim(),
      Issue_Date:         r.querySelector(".cert-date").value.trim(),
      Credential_ID:      r.querySelector(".cert-id").value.trim(),
      Certificate_URL:    r.querySelector(".cert-url").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { certShow("Certifications saved successfully!", "success"); })
    .withFailureHandler(function(e) { certShow(e.message || e, "danger"); })
    .saveCertificationList(data);
}

function certShow(msg, type) {
  document.getElementById("certMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
