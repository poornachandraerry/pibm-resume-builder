<div class="container-fluid py-3">
  <div id="intMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Internships</h4>
    <button class="btn btn-success btn-sm" onclick="addIntRow()">+ Add Internship</button>
  </div>
  <div id="intContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveInt()">Save Internships</button>
  </div>
</div>

<script>
loadInternships();

function loadInternships() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("intContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) { list.forEach(addIntRow); }
      else { addIntRow(); }
    })
    .withFailureHandler(function(e) { intShow(e.message || e, "danger"); })
    .getInternshipList();
}

function addIntRow(data) {
  data = data || {};
  var d = document.getElementById("intContainer");
  var id = "int_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  d.innerHTML += '<div class="border rounded p-3 mb-3 int-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Organization <span class="text-danger">*</span></label>' +
    '<input class="form-control int-org" value="' + esc(data.Organization||data.Company||"") + '" placeholder="Company / Organization"></div>' +
    '<div class="col-md-6"><label class="form-label">Role</label>' +
    '<input class="form-control int-role" value="' + esc(data.Role||data.Designation||"") + '" placeholder="e.g. Marketing Intern"></div>' +
    '<div class="col-md-3"><label class="form-label">Start Date</label>' +
    '<input class="form-control int-start" value="' + esc(data.Start_Date||"") + '" placeholder="Jun 2023"></div>' +
    '<div class="col-md-3"><label class="form-label">End Date</label>' +
    '<input class="form-control int-end" value="' + esc(data.End_Date||"") + '" placeholder="Aug 2023"></div>' +
    '<div class="col-md-5"><label class="form-label">Location</label>' +
    '<input class="form-control int-loc" value="' + esc(data.Location||"") + '" placeholder="Pune"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '<div class="col-12"><label class="form-label">Description</label>' +
    '<textarea class="form-control int-desc" rows="3" placeholder="What did you work on?">' + esc(data.Description||"") + '</textarea></div>' +
    '</div></div>';
}

function saveInt() {
  var items = document.querySelectorAll(".int-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var o = r.querySelector(".int-org").value.trim();
    if (!o) { intShow("Organization is required for all rows.", "danger"); return; }
    data.push({
      Organization: o,
      Role:         r.querySelector(".int-role").value.trim(),
      Start_Date:   r.querySelector(".int-start").value.trim(),
      End_Date:     r.querySelector(".int-end").value.trim(),
      Location:     r.querySelector(".int-loc").value.trim(),
      Description:  r.querySelector(".int-desc").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { intShow("Internships saved successfully!", "success"); })
    .withFailureHandler(function(e) { intShow(e.message || e, "danger"); })
    .saveInternshipList(data);
}

function intShow(msg, type) {
  document.getElementById("intMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
