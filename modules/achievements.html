<div class="container-fluid py-3">
  <div id="achMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Achievements</h4>
    <button class="btn btn-success btn-sm" onclick="addAchRow()">+ Add Achievement</button>
  </div>
  <div id="achContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveAch()">Save Achievements</button>
  </div>
</div>

<script>
loadAchievements();

function loadAchievements() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("achContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) { list.forEach(addAchRow); }
      else { addAchRow(); }
    })
    .withFailureHandler(function(e) { achShow(e.message || e, "danger"); })
    .getAchievementList();
}

function addAchRow(data) {
  data = data || {};
  var d = document.getElementById("achContainer");
  var id = "ach_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  d.innerHTML += '<div class="border rounded p-3 mb-3 ach-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Achievement Title <span class="text-danger">*</span></label>' +
    '<input class="form-control ach-title" value="' + esc(data.Title||"") + '" placeholder="e.g. Best Student Award"></div>' +
    '<div class="col-md-5"><label class="form-label">Category</label>' +
    '<input class="form-control ach-cat" value="' + esc(data.Category||"") + '" placeholder="e.g. Academic, Sports, Extra-curricular"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '<div class="col-md-6"><label class="form-label">Organization / Institution</label>' +
    '<input class="form-control ach-org" value="' + esc(data.Organization||"") + '" placeholder="Awarding organization"></div>' +
    '<div class="col-md-3"><label class="form-label">Year</label>' +
    '<input class="form-control ach-year" value="' + esc(data.Year||"") + '" placeholder="2023"></div>' +
    '<div class="col-12"><label class="form-label">Description</label>' +
    '<textarea class="form-control ach-desc" rows="2" placeholder="Brief description...">' + esc(data.Description||"") + '</textarea></div>' +
    '</div></div>';
}

function saveAch() {
  var items = document.querySelectorAll(".ach-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var t = r.querySelector(".ach-title").value.trim();
    if (!t) { achShow("Achievement title is required.", "danger"); return; }
    data.push({
      Title:        t,
      Category:     r.querySelector(".ach-cat").value.trim(),
      Organization: r.querySelector(".ach-org").value.trim(),
      Year:         r.querySelector(".ach-year").value.trim(),
      Description:  r.querySelector(".ach-desc").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { achShow("Achievements saved successfully!", "success"); })
    .withFailureHandler(function(e) { achShow(e.message || e, "danger"); })
    .saveAchievementList(data);
}

function achShow(msg, type) {
  document.getElementById("achMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
