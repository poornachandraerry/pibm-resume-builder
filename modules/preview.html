<div class="container-fluid py-3">

  <div class="d-flex flex-wrap gap-2 align-items-center mb-4 p-3 bg-white border rounded">
    <div>
      <label class="form-label mb-1 small fw-bold">Template</label>
      <select id="templateSelect" class="form-select form-select-sm" style="min-width:180px" onchange="renderPreview()">
        <option value="FR1">FR1 — Fresher Classic</option>
        <option value="FR2">FR2 — Fresher Modern</option>
        <option value="ER1">ER1 — Experienced</option>
        <option value="ER2">ER2 — Executive</option>
        <option value="ER3">ER3 — Minimal</option>
        <option value="ER4">ER4 — Premium</option>
      </select>
    </div>
    <div class="ms-auto d-flex gap-2 flex-wrap">
      <button class="btn btn-secondary btn-sm" onclick="loadResume()">↺ Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="doGenerate()">⬇ Generate PDF</button>
      <button class="btn btn-success btn-sm" onclick="doEmail()">✉ Email Resume</button>
    </div>
  </div>

  <div id="previewMsg"></div>

  <div id="resumePreview" class="bg-white border rounded p-4" style="min-height:600px">
    <div class="text-center text-muted py-5">Loading resume data...</div>
  </div>

</div>

<script>
var _resumeData = {};

loadResume();

function loadResume() {
  google.script.run
    .withSuccessHandler(function(data) {
      _resumeData = data || {};
      renderPreview();
    })
    .withFailureHandler(function(e) { pvShow(e.message || e, "danger"); })
    .getResumeData(PIBM.state.studentId || "STU000001");
}

function renderPreview() {
  var p = _resumeData.personal || {};
  var education = _resumeData.education || [];
  var experience = _resumeData.experience || [];
  var internships = _resumeData.internships || [];
  var projects = _resumeData.projects || [];
  var skills = _resumeData.skills || [];
  var certs = _resumeData.certifications || [];
  var ach = _resumeData.achievements || [];

  var html = '<div style="font-family:Georgia,serif;max-width:800px;margin:auto">';

  // Header
  html += '<div style="text-align:center;border-bottom:2px solid #0d3b6e;padding-bottom:12px;margin-bottom:16px">';
  html += '<h2 style="margin:0;color:#0d3b6e">' + x(p.name || p.Full_Name || "") + '</h2>';
  html += '<div>' + [p.email||p.Email, p.mobile||p.Mobile, p.linkedin||p.LinkedIn].filter(Boolean).map(x).join(" | ") + '</div>';
  if (p.address || p.Address) html += '<div>' + x(p.address || p.Address || "") + '</div>';
  html += '</div>';

  // Objective
  if (p.objective || p.Objective) {
    html += sec("Career Objective") + '<p>' + x(p.objective || p.Objective) + '</p>';
  }

  // Education
  if (education.length) {
    html += sec("Education");
    education.forEach(function(e) {
      html += '<div style="margin-bottom:8px"><strong>' + x(e.Qualification||e.degree||"") + '</strong>';
      if (e.Specialization||e.specialization) html += ' — ' + x(e.Specialization||e.specialization);
      html += '<br>' + x(e.Institute||e.institute||"");
      if (e.Board||e.university) html += ', ' + x(e.Board||e.university);
      html += ' <span style="color:#666">(' + x(e.Year||e.passingYear||"") + ')';
      if (e.Score||e.cgpa) html += ' | ' + x(e.Score||e.cgpa);
      html += '</span></div>';
    });
  }

  // Experience
  if (experience.length) {
    html += sec("Work Experience");
    experience.forEach(function(e) {
      html += '<div style="margin-bottom:10px"><strong>' + x(e.Designation||e.designation||"") + '</strong> — ' + x(e.Company||e.company||"");
      html += '<br><em style="color:#666">' + x(e.Start_Date||e.startDate||"") + ' – ' + x(e.End_Date||e.endDate||"Present") + '</em>';
      if (e.Responsibilities||e.responsibilities) html += '<p style="margin:4px 0 0">' + x(e.Responsibilities||e.responsibilities) + '</p>';
      html += '</div>';
    });
  }

  // Internships
  if (internships.length) {
    html += sec("Internships");
    internships.forEach(function(i) {
      html += '<div style="margin-bottom:8px"><strong>' + x(i.Role||i.role||i.Designation||"") + '</strong> — ' + x(i.Organization||i.company||"");
      html += '<br><em style="color:#666">' + x(i.Start_Date||"") + ' – ' + x(i.End_Date||"") + '</em>';
      if (i.Description) html += '<p style="margin:4px 0 0">' + x(i.Description) + '</p>';
      html += '</div>';
    });
  }

  // Projects
  if (projects.length) {
    html += sec("Projects");
    projects.forEach(function(p) {
      html += '<div style="margin-bottom:8px"><strong>' + x(p.Title||p.title||p.Project_Title||"") + '</strong>';
      if (p.Technologies||p.technologies) html += ' <em style="color:#666">(' + x(p.Technologies||p.technologies) + ')</em>';
      if (p.Description||p.description) html += '<p style="margin:4px 0 0">' + x(p.Description||p.description) + '</p>';
      html += '</div>';
    });
  }

  // Skills
  if (skills.length) {
    html += sec("Skills");
    html += '<div>' + skills.map(function(s){ return '<span style="display:inline-block;background:#eef3ff;color:#0d3b6e;padding:2px 10px;border-radius:12px;margin:2px;font-size:.9em">' + x(s.name||s.Skill_Name||"") + '</span>'; }).join("") + '</div>';
  }

  // Certifications
  if (certs.length) {
    html += sec("Certifications") + '<ul>';
    certs.forEach(function(c){ html += '<li>' + x(c.Certification_Name||c.name||"") + (c.Organization ? " — " + x(c.Organization) : "") + '</li>'; });
    html += '</ul>';
  }

  // Achievements
  if (ach.length) {
    html += sec("Achievements") + '<ul>';
    ach.forEach(function(a){ html += '<li>' + x(a.Title||a.title||"") + '</li>'; });
    html += '</ul>';
  }

  html += '</div>';
  document.getElementById("resumePreview").innerHTML = html;
}

function sec(title) {
  return '<h4 style="border-bottom:1px solid #0d3b6e;color:#0d3b6e;margin-top:16px;padding-bottom:4px">' + title + '</h4>';
}

function x(s) { return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function doGenerate() {
  pvShow("Generating PDF...", "info");
  google.script.run
    .withSuccessHandler(function(r) {
      pvShow('PDF ready! <a href="' + r.url + '" target="_blank" class="alert-link">Click here to open</a>', "success");
    })
    .withFailureHandler(function(e) { pvShow(e.message || e, "danger"); })
    .generateResume(PIBM.state.studentId || "STU000001", document.getElementById("templateSelect").value);
}

function doEmail() {
  pvShow("Sending email...", "info");
  google.script.run
    .withSuccessHandler(function() { pvShow("Resume emailed successfully!", "success"); })
    .withFailureHandler(function(e) { pvShow(e.message || e, "danger"); })
    .emailResume(PIBM.state.studentId || "STU000001", document.getElementById("templateSelect").value);
}

function pvShow(msg, type) {
  document.getElementById("previewMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}
</script>
