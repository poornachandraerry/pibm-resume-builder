<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Resume Preview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f6f8}
.toolbar{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid #ddd;padding:12px}
.preview{background:#fff;min-height:1100px;border:1px solid #ddd;border-radius:8px;padding:40px}
.section-title{font-weight:700;border-bottom:2px solid #0d6efd;padding-bottom:4px;margin-top:20px}
.small-label{font-size:.8rem;color:#666}
.skill-pill{display:inline-block;background:#eef3ff;color:#0d6efd;padding:2px 10px;border-radius:12px;margin:2px;font-size:.85rem}
</style>
</head>
<body>

<div class="toolbar">
<div class="container-fluid">
<div class="row g-2 align-items-center">

<div class="col-lg-3">
<label class="small-label">Resume Template</label>
<select id="template" class="form-select" onchange="renderPreview()">
<option value="FR1">FR1 - Fresher Blue</option>
<option value="FR2">FR2 - Fresher Modern</option>
<option value="ER1">ER1 - Experienced Professional</option>
<option value="ER2">ER2 - Executive</option>
<option value="ER3">ER3 - Minimal</option>
<option value="ER4">ER4 - Premium</option>
</select>
</div>

<div class="col-lg-9 text-lg-end">
<button class="btn btn-secondary" onclick="loadResume()">Refresh</button>
<button class="btn btn-primary" onclick="generateResumePdf()">Generate PDF</button>
<button class="btn btn-success" onclick="saveToDrive()">Save to Drive</button>
<button class="btn btn-info text-white" onclick="emailResumeToStudent()">Email Resume</button>
</div>

</div>
</div>
</div>

<div class="container-fluid py-4">

<div id="message"></div>

<div id="resumePreview" class="preview">
<div class="text-center text-muted">
Loading Resume...
</div>
</div>

</div>

<script>

let resumeData={};

function currentStudentId(){
  return (window.PIBM && PIBM.state && PIBM.state.studentId) || "STU000001";
}

loadResume();

function loadResume(){

google.script.run
.withSuccessHandler(function(data){

resumeData=data||{};
renderPreview();

})
.withFailureHandler(function(e){

show(e.message,"danger");

})
.getResumeData(currentStudentId());

}

function renderPreview(){

const p=document.getElementById("resumePreview");

const personal=resumeData.personal||{};
const education=resumeData.education||[];
const experience=resumeData.experience||[];
const internships=resumeData.internships||[];
const projects=resumeData.projects||[];
const skills=resumeData.skills||[];
const certifications=resumeData.certifications||[];
const achievements=resumeData.achievements||[];

let html="";

html+=`
<h2>${personal.name||""}</h2>
<div>${personal.email||""} | ${personal.mobile||""}</div>
<div>${personal.linkedin||""}</div>
`;

if(personal.objective){
html+=`<div class="section-title">Career Objective</div><p>${personal.objective}</p>`;
}

html+='<div class="section-title">Education</div>';
if(!education.length){
html+='<p class="text-muted">No education details added yet.</p>';
}
education.forEach(function(e){
html+=`
<div class="mb-2">
<strong>${e.degree||e.course||""}</strong>${e.specialization?" - "+e.specialization:""}<br>
${e.institute||""}${e.university?", "+e.university:""} (${e.passingYear||e.endYear||""})<br>
${e.cgpa?"CGPA/%: "+e.cgpa:""}
</div>`;
});

if(experience.length){
html+='<div class="section-title">Experience</div>';
experience.forEach(function(e){
html+=`
<div class="mb-3">
<strong>${e.designation||""}</strong> - ${e.company||""}<br>
${e.startDate||""} - ${e.endDate||"Present"}
<p>${e.responsibilities||""}</p>
</div>`;
});
}

if(internships.length){
html+='<div class="section-title">Internships</div>';
internships.forEach(function(i){
html+=`<p><strong>${i.designation||i.role||""}</strong> - ${i.company||""}<br>${i.responsibilities||""}</p>`;
});
}

if(projects.length){
html+='<div class="section-title">Projects</div>';
projects.forEach(function(pr){
html+=`<p><strong>${pr.title||""}</strong><br>${pr.description||""}${pr.technologies?"<br><em>Tech: "+pr.technologies+"</em>":""}</p>`;
});
}

if(certifications.length){
html+='<div class="section-title">Certifications</div><ul>';
certifications.forEach(function(c){
html+=`<li>${c.name||""}${c.organization?" - "+c.organization:""}</li>`;
});
html+="</ul>";
}

if(achievements.length){
html+='<div class="section-title">Achievements</div><ul>';
achievements.forEach(function(a){
html+=`<li>${a.title||""}</li>`;
});
html+="</ul>";
}

if(skills.length){
html+='<div class="section-title">Skills</div><div>';
skills.forEach(function(s){
html+=`<span class="skill-pill">${s.name||""}</span>`;
});
html+="</div>";
}

p.innerHTML=html;

}

function generateResumePdf(){

google.script.run
.withSuccessHandler(function(r){

show("Resume generated successfully.","success");

if(r&&r.url){
window.open(r.url,"_blank");
}

})
.withFailureHandler(function(e){

show(e.message,"danger");

})
.generateResume(currentStudentId(),document.getElementById("template").value);

}

function saveToDrive(){

google.script.run
.withSuccessHandler(function(r){

show("Resume saved to Google Drive.","success");

if(r&&r.url){
window.open(r.url,"_blank");
}

})
.withFailureHandler(function(e){

show(e.message,"danger");

})
.saveResumeToDrive(currentStudentId(),document.getElementById("template").value);

}

function emailResumeToStudent(){

google.script.run
.withSuccessHandler(function(){

show("Resume emailed successfully.","success");

})
.withFailureHandler(function(e){

show(e.message,"danger");

})
.emailResume(currentStudentId(),document.getElementById("template").value);

}

function show(msg,type){

document.getElementById("message").innerHTML=
`<div class="alert alert-${type} alert-dismissible fade show">
${msg}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>`;

}

</script>

</body>
</html>
