<div class="container-fluid py-3">

  <div id="alertContainer"></div>

  <div style="border:1px solid #dee2e6;border-radius:10px;padding:20px;background:#fff;margin-bottom:20px">
    <h4 class="mb-4">Personal Information</h4>

    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Full Name <span class="text-danger">*</span></label>
        <input class="form-control" id="fullName" placeholder="e.g. Rahul Sharma" maxlength="100">
      </div>

      <div class="col-md-6">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input class="form-control" id="email" type="email" placeholder="your@email.com">
      </div>

      <div class="col-md-6">
        <label class="form-label">Mobile <span class="text-danger">*</span></label>
        <input class="form-control" id="mobile" placeholder="10-digit mobile number" maxlength="10">
      </div>

      <div class="col-md-6">
        <label class="form-label">LinkedIn URL</label>
        <input class="form-control" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
      </div>

      <div class="col-md-6">
        <label class="form-label">GitHub URL</label>
        <input class="form-control" id="github" placeholder="https://github.com/yourusername">
      </div>

      <div class="col-md-6">
        <label class="form-label">City</label>
        <input class="form-control" id="city" placeholder="Pune">
      </div>

      <div class="col-12">
        <label class="form-label">Address</label>
        <textarea class="form-control" id="address" rows="2" placeholder="Flat/House No, Street, Area"></textarea>
      </div>

      <div class="col-12">
        <label class="form-label">Career Objective</label>
        <textarea class="form-control" id="objective" rows="3" placeholder="Write a short career objective (2-3 sentences)..."></textarea>
      </div>

    </div>

    <div class="text-end mt-4">
      <button class="btn btn-primary" onclick="saveProfile()">Save Personal Details</button>
    </div>

  </div>

</div>

<script>

loadProfile();

function loadProfile() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res) return;
      document.getElementById("fullName").value  = res.Full_Name  || "";
      document.getElementById("email").value     = res.Email      || "";
      document.getElementById("mobile").value    = res.Mobile     || "";
      document.getElementById("linkedin").value  = res.LinkedIn   || "";
      document.getElementById("github").value    = res.GitHub     || "";
      document.getElementById("city").value      = res.City       || "";
      document.getElementById("address").value   = res.Address    || "";
      document.getElementById("objective").value = res.Objective  || "";
    })
    .withFailureHandler(function(e) {
      showAlert(e.message || e, "danger");
    })
    .loadStudentProfile();
}

function saveProfile() {
  var fullName = document.getElementById("fullName").value.trim();
  var email    = document.getElementById("email").value.trim();
  var mobile   = document.getElementById("mobile").value.trim();

  if (!fullName) { showAlert("Full Name is required.", "danger"); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert("Valid email is required.", "danger"); return; }
  if (!/^\d{10}$/.test(mobile)) { showAlert("Enter a valid 10-digit mobile number.", "danger"); return; }

  var obj = {
    Full_Name : fullName,
    Email     : email,
    Mobile    : mobile,
    LinkedIn  : document.getElementById("linkedin").value.trim(),
    GitHub    : document.getElementById("github").value.trim(),
    City      : document.getElementById("city").value.trim(),
    Address   : document.getElementById("address").value.trim(),
    Objective : document.getElementById("objective").value.trim()
  };

  google.script.run
    .withSuccessHandler(function() {
      showAlert("Personal details saved successfully!", "success");
    })
    .withFailureHandler(function(e) {
      showAlert(e.message || e, "danger");
    })
    .saveValidatedStudent(obj);
}

function showAlert(msg, type) {
  document.getElementById("alertContainer").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' +
    msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}

</script>
