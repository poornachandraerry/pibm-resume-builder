<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .section-card{border:1px solid #dee2e6;border-radius:10px;padding:20px;margin-bottom:20px;background:#fff}
    .required::after{content:" *";color:#dc3545}
  </style>
</head>
<body>

<div class="container-fluid py-3">

  <div id="alertContainer"></div>

  <div class="section-card">
    <h4 class="mb-4">Personal Information</h4>

    <form id="personalForm">

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label required">First Name</label>
          <input class="form-control" id="firstName" maxlength="50" required>
        </div>

        <div class="col-md-6">
          <label class="form-label required">Last Name</label>
          <input class="form-control" id="lastName" maxlength="50" required>
        </div>

        <div class="col-md-6">
          <label class="form-label required">Email</label>
          <input class="form-control" id="email" type="email" required>
        </div>

        <div class="col-md-6">
          <label class="form-label required">Mobile</label>
          <input class="form-control" id="mobile" maxlength="10" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">LinkedIn</label>
          <input class="form-control" id="linkedin">
        </div>

        <div class="col-md-6">
          <label class="form-label">GitHub</label>
          <input class="form-control" id="github">
        </div>

        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea class="form-control" id="address" rows="3"></textarea>
        </div>

      </div>

      <div class="text-end mt-4">
        <button type="button" class="btn btn-primary" onclick="saveProfile()">
          Save Personal Details
        </button>
      </div>

    </form>

  </div>

</div>

<script>

loadProfile();

function loadProfile(){

google.script.run
.withSuccessHandler(function(res){

if(!res) return;

firstName.value=res.First_Name||"";
lastName.value=res.Last_Name||"";
email.value=res.Email||"";
mobile.value=res.Mobile||"";
linkedin.value=res.LinkedIn||"";
github.value=res.GitHub||"";
address.value=res.Address||"";

})
.withFailureHandler(function(e){
showAlert(e.message,"danger");
})
.loadStudentProfile();

}

function validate(){

if(firstName.value.trim()=="") return "First Name is required.";

if(lastName.value.trim()=="") return "Last Name is required.";

const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email.value.trim()))
return "Valid email required.";

if(!/^\d{10}$/.test(mobile.value.trim()))
return "Enter valid 10 digit mobile number.";

return null;

}

function saveProfile(){

const err=validate();

if(err){
showAlert(err,"danger");
return;
}

const obj={
First_Name:firstName.value.trim(),
Last_Name:lastName.value.trim(),
Email:email.value.trim(),
Mobile:mobile.value.trim(),
LinkedIn:linkedin.value.trim(),
GitHub:github.value.trim(),
Address:address.value.trim()
};

google.script.run
.withSuccessHandler(function(r){
showAlert("Personal profile saved successfully.","success");
})
.withFailureHandler(function(e){
showAlert(e.message,"danger");
})
.saveValidatedStudent(obj);

}

function showAlert(msg,type){

alertContainer.innerHTML=
'<div class="alert alert-'+type+' alert-dismissible fade show">'+
msg+
'<button class="btn-close" data-bs-dismiss="alert"></button></div>';

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
