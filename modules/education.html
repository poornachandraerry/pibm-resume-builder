<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Education</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card-box{border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:15px}
  </style>
</head>
<body>
<div class="container-fluid py-3">
  <div id="msg"></div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Education Details</h4>
    <button class="btn btn-success" onclick="addRow()">+ Add Education</button>
  </div>

  <div id="educationContainer"></div>

  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveEducation()">Save Education</button>
  </div>
</div>

<template id="eduTemplate">
<div class="card-box edu-item">
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Qualification</label>
<input class="form-control qualification">
</div>
<div class="col-md-6">
<label class="form-label">Institute</label>
<input class="form-control institute">
</div>
<div class="col-md-4">
<label class="form-label">Board / University</label>
<input class="form-control board">
</div>
<div class="col-md-2">
<label class="form-label">Year</label>
<input class="form-control year" maxlength="4">
</div>
<div class="col-md-2">
<label class="form-label">Percentage / CGPA</label>
<input class="form-control score">
</div>
<div class="col-md-3">
<label class="form-label">Specialization</label>
<input class="form-control specialization">
</div>
<div class="col-md-1 d-flex align-items-end">
<button class="btn btn-outline-danger w-100" onclick="this.closest('.edu-item').remove()">X</button>
</div>
</div>
</div>
</template>

<script>
document.addEventListener("DOMContentLoaded",loadEducation);

function addRow(data={}){
 const node=document.getElementById("eduTemplate").content.cloneNode(true);
 const item=node.querySelector(".edu-item");
 item.querySelector(".qualification").value=data.Qualification||"";
 item.querySelector(".institute").value=data.Institute||"";
 item.querySelector(".board").value=data.Board||"";
 item.querySelector(".year").value=data.Year||"";
 item.querySelector(".score").value=data.Score||"";
 item.querySelector(".specialization").value=data.Specialization||"";
 document.getElementById("educationContainer").appendChild(node);
}

function loadEducation(){
 google.script.run
 .withSuccessHandler(function(list){
    document.getElementById("educationContainer").innerHTML="";
    if(Array.isArray(list) && list.length){
      list.forEach(addRow);
    }else{
      addRow();
    }
 })
 .withFailureHandler(function(e){show(e.message,"danger");})
 .getEducationList();
}

function saveEducation(){
 const rows=[...document.querySelectorAll(".edu-item")];
 const data=[];
 for(const r of rows){
   const obj={
    Qualification:r.querySelector(".qualification").value.trim(),
    Institute:r.querySelector(".institute").value.trim(),
    Board:r.querySelector(".board").value.trim(),
    Year:r.querySelector(".year").value.trim(),
    Score:r.querySelector(".score").value.trim(),
    Specialization:r.querySelector(".specialization").value.trim()
   };
   if(obj.Qualification===""){show("Qualification is required.","danger");return;}
   data.push(obj);
 }
 google.script.run
 .withSuccessHandler(()=>show("Education details saved successfully.","success"))
 .withFailureHandler(e=>show(e.message,"danger"))
 .saveEducationList(data);
}

function show(msg,type){
 document.getElementById("msg").innerHTML=
 `<div class="alert alert-${type} alert-dismissible fade show">${msg}
 <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
