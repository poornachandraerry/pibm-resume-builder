<div class="container-fluid py-3">
  <div id="eduMsg"></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Education Details</h4>
    <button class="btn btn-success btn-sm" onclick="addEduRow()">+ Add Education</button>
  </div>
  <div id="educationContainer"></div>
  <div class="text-end mt-3">
    <button class="btn btn-primary" onclick="saveEdu()">Save Education</button>
  </div>
</div>

<script>
loadEducation();

function loadEducation() {
  google.script.run
    .withSuccessHandler(function(list) {
      document.getElementById("educationContainer").innerHTML = "";
      if (Array.isArray(list) && list.length) {
        list.forEach(addEduRow);
      } else {
        addEduRow();
      }
    })
    .withFailureHandler(function(e) { eduShow(e.message || e, "danger"); })
    .getEducationList();
}

function addEduRow(data) {
  data = data || {};
  var d = document.getElementById("educationContainer");
  var id = "edu_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  var html = '<div class="border rounded p-3 mb-3 edu-item" id="' + id + '">' +
    '<div class="row g-3">' +
    '<div class="col-md-6"><label class="form-label">Qualification <span class="text-danger">*</span></label>' +
    '<input class="form-control edu-qual" value="' + esc(data.Qualification||"") + '" placeholder="e.g. MBA, B.Tech, HSC"></div>' +
    '<div class="col-md-6"><label class="form-label">Institute</label>' +
    '<input class="form-control edu-inst" value="' + esc(data.Institute||"") + '" placeholder="College / School name"></div>' +
    '<div class="col-md-4"><label class="form-label">Board / University</label>' +
    '<input class="form-control edu-board" value="' + esc(data.Board||"") + '" placeholder="e.g. Pune University"></div>' +
    '<div class="col-md-2"><label class="form-label">Year</label>' +
    '<input class="form-control edu-year" value="' + esc(data.Year||"") + '" maxlength="4" placeholder="2024"></div>' +
    '<div class="col-md-3"><label class="form-label">Percentage / CGPA</label>' +
    '<input class="form-control edu-score" value="' + esc(data.Score||"") + '" placeholder="e.g. 8.5 or 85%"></div>' +
    '<div class="col-md-2"><label class="form-label">Specialization</label>' +
    '<input class="form-control edu-spec" value="' + esc(data.Specialization||"") + '" placeholder="e.g. Finance"></div>' +
    '<div class="col-md-1 d-flex align-items-end">' +
    '<button class="btn btn-outline-danger w-100" onclick="document.getElementById(\'' + id + '\').remove()">✕</button></div>' +
    '</div></div>';
  d.innerHTML += html;
}

function saveEdu() {
  var items = document.querySelectorAll(".edu-item");
  var data = [];
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var q = r.querySelector(".edu-qual").value.trim();
    if (!q) { eduShow("Qualification is required for all rows.", "danger"); return; }
    data.push({
      Qualification: q,
      Institute:     r.querySelector(".edu-inst").value.trim(),
      Board:         r.querySelector(".edu-board").value.trim(),
      Year:          r.querySelector(".edu-year").value.trim(),
      Score:         r.querySelector(".edu-score").value.trim(),
      Specialization:r.querySelector(".edu-spec").value.trim()
    });
  }
  google.script.run
    .withSuccessHandler(function() { eduShow("Education saved successfully!", "success"); })
    .withFailureHandler(function(e) { eduShow(e.message || e, "danger"); })
    .saveEducationList(data);
}

function eduShow(msg, type) {
  document.getElementById("eduMsg").innerHTML =
    '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg +
    '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
}

function esc(s) { return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
