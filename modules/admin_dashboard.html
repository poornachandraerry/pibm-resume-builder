<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f6f8}
.card{border-radius:10px}
.table-responsive{max-height:600px}
</style>
</head>
<body>

<div class="container-fluid py-4">

<div class="d-flex justify-content-between align-items-center mb-3">
<h3>Resume Administration</h3>
<button class="btn btn-primary" onclick="loadStudents()">Refresh</button>
</div>

<div id="msg"></div>

<div class="card">
<div class="card-body">

<div class="table-responsive">
<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th width="260">Actions</th>
</tr>
</thead>

<tbody id="studentTableBody">
<tr><td colspan="5" class="text-center">Loading...</td></tr>
</tbody>

</table>
</div>

</div>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",loadStudents);

function loadStudents(){

google.script.run
.withSuccessHandler(function(list){

const body=document.getElementById("studentTableBody");
body.innerHTML="";

if(!list || list.length===0){
 body.innerHTML='<tr><td colspan="5" class="text-center">No records found.</td></tr>';
 return;
}

list.forEach(function(s){

body.innerHTML+=`
<tr>
<td>${s.Student_ID||""}</td>
<td>${s.Name||""}</td>
<td>${s.Email||""}</td>
<td><span class="badge bg-success">${s.Status||"Ready"}</span></td>
<td>
<button class="btn btn-sm btn-outline-primary" onclick="generate('${s.Student_ID}')">Generate</button>
<button class="btn btn-sm btn-outline-success" onclick="emailResumeToStudent('${s.Student_ID}')">Email</button>
<button class="btn btn-sm btn-outline-secondary" onclick="openResume('${s.Student_ID}')">Open</button>
</td>
</tr>`;
});

})
.withFailureHandler(function(e){
show(e.message,"danger");
})
.getStudentResumeDashboard();

}

function generate(id){
google.script.run
.withSuccessHandler(()=>show("Resume generated.","success"))
.withFailureHandler(e=>show(e.message,"danger"))
.generateStudentResume(id);
}

function emailResumeToStudent(id){
google.script.run
.withSuccessHandler(()=>show("Resume emailed.","success"))
.withFailureHandler(e=>show(e.message,"danger"))
.emailStudentResume(id);
}

function openResume(id){
google.script.run
.withSuccessHandler(function(url){
 if(url){window.open(url,"_blank");}
})
.getStudentResumeUrl(id);
}

function show(msg,type){
document.getElementById("msg").innerHTML=
`<div class="alert alert-${type} alert-dismissible fade show">
${msg}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>`;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
