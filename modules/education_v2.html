
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base target="_top">
<title>Education</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f6f8}
.edu-card{border:1px solid #dee2e6;border-radius:10px;padding:18px;margin-bottom:16px;background:#fff}
</style>
</head>
<body>

<div class="container-fluid py-4">
<div class="d-flex justify-content-between align-items-center mb-3">
<h3>Education Details</h3>
<button class="btn btn-success" onclick="addEducation()">+ Add Education</button>
</div>

<div id="alertBox"></div>
<div id="educationContainer"></div>

<div class="text-end">
<button class="btn btn-primary" onclick="saveEducationData()">Save Education</button>
</div>
</div>

<template id="educationTemplate">
<div class="edu-card edu-item">
<div class="row g-3">

<div class="col-md-3">
<label class="form-label">Qualification</label>
<select class="form-select Qualification"></select>
</div>

<div class="col-md-5">
<label class="form-label">Institute Name</label>
<input class="form-control Institute_Name">
</div>

<div class="col-md-4">
<label class="form-label">Board / University</label>
<input class="form-control Board_University">
</div>

<div class="col-md-3">
<label class="form-label">Year of Passing</label>
<input type="number" class="form-control Year_Of_Passing">
</div>

<div class="col-md-3">
<label class="form-label">Percentage / CGPA</label>
<input class="form-control Percentage">
</div>

<div class="col-md-6 d-flex align-items-end justify-content-end">
<button class="btn btn-outline-danger" type="button"
onclick="this.closest('.edu-item').remove()">Remove</button>
</div>

</div>
</div>
</template>

<script>
let qualificationOptions=[];

document.addEventListener("DOMContentLoaded",initialize);

function initialize(){
 google.script.run
 .withSuccessHandler(function(list){
    qualificationOptions=list||[];
    loadEducation();
 })
 .getQualificationDropdown();
}

function addEducation(data={}){
 const node=document.getElementById("educationTemplate").content.cloneNode(true);
 const item=node.querySelector(".edu-item");
 const ddl=item.querySelector(".Qualification");

 qualificationOptions.forEach(function(q){
   const o=document.createElement("option");
   o.value=q;
   o.textContent=q;
   ddl.appendChild(o);
 });

 ddl.value=data.Qualification||"";
 item.querySelector(".Institute_Name").value=data.Institute_Name||"";
 item.querySelector(".Board_University").value=data.Board_University||"";
 item.querySelector(".Year_Of_Passing").value=data.Year_Of_Passing||"";
 item.querySelector(".Percentage").value=data.Percentage||"";

 educationContainer.appendChild(node);
}

function loadEducation(){
 google.script.run
 .withSuccessHandler(function(res){
    educationContainer.innerHTML="";
    const list=Array.isArray(res)?res:[];
    if(list.length){list.forEach(addEducation);}
    else addEducation();
 })
 .withFailureHandler(e=>show(e.message,"danger"))
 .getEducation("");
}

function saveEducationData(){
 const studentId=sessionStorage.getItem("studentId")||"";
 const rows=[...document.querySelectorAll(".edu-item")];
 const data=[];

 for(const r of rows){
   const obj={
     Qualification:r.querySelector(".Qualification").value,
     Institute_Name:r.querySelector(".Institute_Name").value.trim(),
     Board_University:r.querySelector(".Board_University").value.trim(),
     Year_Of_Passing:r.querySelector(".Year_Of_Passing").value.trim(),
     Percentage:r.querySelector(".Percentage").value.trim()
   };

   if(!obj.Qualification||!obj.Institute_Name||!obj.Board_University){
      show("Please complete all mandatory fields.","danger");
      return;
   }
   data.push(obj);
 }

 google.script.run
 .withSuccessHandler(function(res){
    show(res.message||"Saved","success");
 })
 .withFailureHandler(e=>show(e.message,"danger"))
 .saveEducation(studentId,data);
}

function show(msg,type){
 alertBox.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
}
</script>

</body>
</html>
